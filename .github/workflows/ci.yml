name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config clang \
            libx11-dev libxinerama-dev libxrandr-dev libxcursor-dev \
            libxft-dev libfontconfig-dev libfreetype6-dev \
            cppcheck shellcheck \
            xvfb xserver-xephyr x11-utils x11-xserver-utils xdotool xterm

      - name: Build release
        run: make CC=${{ matrix.cc }} release

      - name: Lint
        run: make CC=${{ matrix.cc }} lint

      - name: Run checks under Xvfb
        run: xvfb-run -a make CC=${{ matrix.cc }} check

      - name: Run IPC roundtrip under Xvfb
        run: |
          cp config.def.h config.h
          sed -i 's/static const int ipc_enable = 0;/static const int ipc_enable = 1;/' config.h
          make CC=${{ matrix.cc }} clean release
          export XDG_RUNTIME_DIR="$(mktemp -d)"
          xvfb-run -a bash ./tests/ipc/roundtrip.sh ./cupidwm ./cupidwmctl

      - name: Validate release tarball
        run: make CC=${{ matrix.cc }} distcheck

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.cc }}
          path: |
            /tmp/cupidwm-smoke.*
            /tmp/cupidwm-ewmh.*
            /tmp/cupidwm-ipc.*
