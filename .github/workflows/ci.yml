name: CI

on:
  push:
  pull_request:

jobs:
  build-and-dist:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang pkg-config cppcheck \
            libx11-dev libxinerama-dev libxcursor-dev libxft-dev \
            libfontconfig1-dev libfreetype6-dev

      - name: Build (-Werror)
        run: |
          make clean
          make CC=${{ matrix.cc }} EXTRA_CFLAGS="-Werror"

      - name: Static checks
        run: |
          make CC=${{ matrix.cc }} check EXTRA_CFLAGS="-Werror"

      - name: Distcheck
        run: |
          make CC=${{ matrix.cc }} distcheck EXTRA_CFLAGS="-Werror"

  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libx11-dev libxinerama-dev libxcursor-dev libxft-dev \
            libfontconfig1-dev libfreetype6-dev \
            xserver-xephyr x11-utils xdotool xterm gawk sed grep xvfb

      - name: Start Xvfb host display
        run: |
          Xvfb :1 -screen 0 1920x1080x24 -ac +extension RANDR > /tmp/xvfb.log 2>&1 &
          sleep 2
          echo "DISPLAY=:1" >> "$GITHUB_ENV"

      - name: Build and run smoke test
        run: |
          make clean
          make EXTRA_CFLAGS="-Werror"
          make test-smoke
